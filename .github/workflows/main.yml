on:
  workflow_dispatch:
    inputs:
      vscode_publish:
        description: 'Publish VSCode extension'
        type: boolean
        default: true
      npm_publish:
        description: 'Publish NPM package'
        type: boolean
        default: true

name: Deploy Extension and Package

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm run build && cd taqwim && npm run build
      - run: xvfb-run -a npm test
      - run: cd taqwim && npm run test

      - name: Publish to VSCode marketplace
        if: github.event.inputs.vscode_publish == 'true'
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com

      - name: Publish to NPM
        if: github.event.inputs.npm_publish == 'true'
        run: cd taqwim && npm publish
